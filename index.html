<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabic Flashcards</title>
  <link rel="manifest" href="/manifest.json" />
</head>
<body>

<h1>Arabic Flashcards</h1>

<input id="english" placeholder="English"><br><br>
<input id="arabic" placeholder="Arabic"><br><br>

<button onclick="addCard()">Add Card</button>

<h2>Cards</h2>
<div id="cards"></div>
<div id="list"></div>

<script>
let cards = JSON.parse(localStorage.getItem("cards") || "[]");
let current = 0;
let showingEnglish = true;

function save() {
  localStorage.setItem("cards", JSON.stringify(cards));
}

function addCard() {
  const en = document.getElementById("english").value.trim();
  const ar = document.getElementById("arabic").value.trim();
  if (!en || !ar) return;
  cards.push({ en, ar });
  document.getElementById("english").value = "";
  document.getElementById("arabic").value = "";
  current = cards.length - 1;
  showingEnglish = true;
  save();
  render();
}

function nextCard() {
  if (cards.length === 0) return;
  current = (current + 1) % cards.length;
  showingEnglish = true;
  render();
}

function flipCard() {
  if (cards.length === 0) return;
  showingEnglish = !showingEnglish;
  render();
}

function deleteCurrentCard() {
  if (cards.length === 0) return;
  cards.splice(current, 1);
  if (current >= cards.length) current = 0;
  showingEnglish = true;
  save();
  render();
}

function render() {
  const div = document.getElementById("cards");
  const list = document.getElementById("list");

  if (cards.length === 0) {
    div.innerHTML = "<p>No cards yet</p>";
    list.innerHTML = "";
    return;
  }

  const card = cards[current];

  div.innerHTML = `
    <div style="font-size: 24px; margin: 20px;">
      ${showingEnglish ? card.en : card.ar}
    </div>
    <button onclick="flipCard()">Flip</button>
    <button onclick="nextCard()">Next</button>
    <button onclick="deleteCurrentCard()">Delete</button>
    <p>${current + 1} / ${cards.length}</p>
  `;

  list.innerHTML = cards
    .map((c, i) => `<p>${i + 1}. ${c.en} → ${c.ar}</p>`)
    .join("");
}

render();
</script>
</body>
</html>
