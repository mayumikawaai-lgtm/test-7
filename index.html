<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabic Flashcards</title>
  <link rel="manifest" href="/manifest.json" />
</head>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
<body style="font-family: sans-serif; text-align: center; padding: 40px;">

<h1>Arabic Flashcards</h1>

<input id="english" placeholder="English"><br><br>
<input id="arabic" placeholder="Arabic"><br><br>

<button onclick="addCard()">Add Card</button>

<h2>Cards</h2>
<div id="cards"></div>

<script>
let cards = JSON.parse(localStorage.getItem("cards") || "[]");
let current = 0;
let showingEnglish = true;

function save() {
  localStorage.setItem("cards", JSON.stringify(cards));
}

function addCard() {
  const en = document.getElementById("english").value;
  const ar = document.getElementById("arabic").value;
  if (!en || !ar) return;
  cards.push({en, ar});
  save();
  render();
}

function nextCard() {
  if (cards.length === 0) return;
  current = (current + 1) % cards.length;
  showingEnglish = true;
  render();
}

function flipCard() {
  showingEnglish = !showingEnglish;
  render();
}

function render() {
  const div = document.getElementById("cards");

  if (cards.length === 0) {
    div.innerHTML = "<p>No cards yet</p>";
    return;
  }

  const card = cards[current];

  div.innerHTML = `
    <div style="font-size: 24px; margin: 20px;">
      ${showingEnglish ? card.en : card.ar}
    </div>
    <button onclick="flipCard()">Flip</button>
    <button onclick="nextCard()">Next</button>
  `;
}

render();
</script>
</body>
</html>
